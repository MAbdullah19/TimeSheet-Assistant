name: Poll Standup & Deploy

on:
  schedule:
    - cron: "0 4-14 * * 1-5"  # top of each hour, 09:00–19:00 PKT, Mon–Fri
  workflow_dispatch: {}

# Allow only one concurrent deployment.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python scripts/poll_and_record.py
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          STANDUP_CHANNEL_ID: ${{ secrets.STANDUP_CHANNEL_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          TEAM_TIMEZONE: ${{ secrets.TEAM_TIMEZONE }}
      - run: python scripts/build_dashboard_data.py
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          TEAM_TIMEZONE: ${{ secrets.TEAM_TIMEZONE }}
      # Upload here, in the job that just regenerated docs/data.json, so the
      # freshly built data is what gets deployed (artifacts don't carry across
      # jobs otherwise).
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

  deploy:
    needs: poll
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
