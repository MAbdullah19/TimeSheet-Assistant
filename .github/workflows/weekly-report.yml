name: Weekly Report & Deploy

on:
  schedule:
    # 10:00 PKT (UTC+5) every Tuesday. Tuesday so the previous Monday's standup
    # — which carries the prior Friday's work in its "Previous Workday" field —
    # has already been polled and recorded (see core/weekly.py).
    - cron: "0 5 * * 2"
  workflow_dispatch: {}

# Share the `pages` concurrency group with Poll Standup & Deploy so the two
# deploys serialize instead of racing each other.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  weekly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python scripts/post_weekly_report.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_WEEKLY: ${{ secrets.GEMINI_API_KEY_WEEKLY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          TEAM_TIMEZONE: ${{ secrets.TEAM_TIMEZONE }}
      - run: python scripts/build_dashboard_data.py
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          TEAM_TIMEZONE: ${{ secrets.TEAM_TIMEZONE }}
      # Upload here, in the job that just regenerated docs/data.json, so the
      # freshly built data is what gets deployed.
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

  deploy:
    needs: weekly
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
