<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TUKL-NUST R&amp;D Center | Deep Learning Lab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="topbar">
    <a class="brand" href="#/" aria-label="Home">
      <span class="brand-mark" aria-hidden="true">◆</span>
      <span class="brand-text">
        <span class="brand-name">TUKL-NUST R&amp;D Center</span>
        <span class="brand-sub">Deep Learning Lab</span>
      </span>
    </a>

    <nav class="nav" aria-label="Primary">
      <a class="nav-link" data-route="/" href="#/">Bulletin</a>
      <a class="nav-link" data-route="/directory" href="#/directory">Directory</a>
    </nav>

    <div class="nav-tools">
      <div class="search" role="search">
        <input
          id="nav-search"
          type="text"
          autocomplete="off"
          spellcheck="false"
          placeholder="Search interns or supervisors…"
          aria-label="Search interns or supervisors"
          aria-haspopup="listbox"
          aria-expanded="false"
        />
        <div id="nav-search-results" class="search-results" role="listbox" hidden></div>
      </div>
      <span id="generated-at" class="generated-at"></span>
    </div>
  </header>

  <main>
    <div id="view" aria-live="polite"></div>
  </main>

  <footer class="site-footer">
    <span>TUKL-NUST R&amp;D Center · Deep Learning Lab — intern standup tracker</span>
  </footer>

  <script src="./app.js"></script>
</body>
</html>
